<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Carga Ferroviaria · Rail Load Calculator</title>
<meta name="description" content="Herramienta de cálculo de carga para transporte ferroviario de perfiles de acero. Calcula unidades, pesos y planifica composiciones de tren.">
<meta name="author" content="Rubén Prendes">
<meta name="theme-color" content="#f47d30">
<meta property="og:title" content="Calculadora de Carga Ferroviaria">
<meta property="og:description" content="Calcula cargas ferroviarias de perfiles de acero: unidades por peso máximo, peso por unidades y planificación de composiciones.">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚂</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
/* ─── Reset & Variables ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --orange: #f47d30;
  --orange-soft: #fff4ee;
  --orange-border: #f4c09a;
  --orange-deep: #c45a15;
  --orange-glow: rgba(244, 125, 48, 0.12);

  --steel: #555658;
  --steel-soft: #eef0f2;
  --steel-border: #b0b3b6;
  --steel-deep: #3a3c3e;

  --bg: #ffffff;
  --bg-raised: #fafaf9;
  --bg-sunken: #f3f3f1;
  --border: rgba(0, 0, 0, 0.08);
  --border-strong: rgba(0, 0, 0, 0.18);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);

  --text: #1a1a1a;
  --text-secondary: #6b6b6b;
  --text-muted: #a0a0a0;

  --success-bg: #eaf3de;
  --success-text: #3b6d11;
  --success-border: #97c459;
  --warn-bg: #faeeda;
  --warn-text: #854f0b;
  --warn-border: #ef9f27;
  --info-bg: #e6f1fb;
  --info-text: #185fa5;
  --info-border: #85b7eb;
  --error-bg: #fce8e8;
  --error-text: #b91c1c;
  --error-border: #f5a3a3;

  --radius: 10px;
  --radius-lg: 14px;
  --radius-xl: 18px;
  --font: 'DM Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --mono: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
}

@media (prefers-color-scheme: dark) {
  :root {
    --orange-soft: #2e1a08;
    --orange-border: #8a4a12;
    --orange-deep: #f9a870;
    --orange-glow: rgba(244, 125, 48, 0.08);

    --steel-soft: #2a2b2c;
    --steel-border: #555658;
    --steel-deep: #c8cacc;

    --bg: #191919;
    --bg-raised: #222222;
    --bg-sunken: #141414;
    --border: rgba(255, 255, 255, 0.08);
    --border-strong: rgba(255, 255, 255, 0.16);
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
    --shadow-lg: 0 8px 30px rgba(0,0,0,0.4);

    --text: #f0f0f0;
    --text-secondary: #999;
    --text-muted: #555;

    --success-bg: #173404;
    --success-text: #c0dd97;
    --success-border: #3b6d11;
    --warn-bg: #412402;
    --warn-text: #fac775;
    --warn-border: #854f0b;
    --info-bg: #042c53;
    --info-text: #85b7eb;
    --info-border: #185fa5;
    --error-bg: #3b0a0a;
    --error-text: #f5a3a3;
    --error-border: #7f1d1d;
  }
}

/* ─── Global ─── */
body {
  font-family: var(--font);
  background: var(--bg-sunken);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  padding: 1rem;
  -webkit-font-smoothing: antialiased;
}

.app {
  max-width: 540px;
  margin: 0 auto;
  padding-bottom: 2rem;
}

/* ─── Header ─── */
.header {
  padding: 1.5rem 0 0.5rem;
  margin-bottom: 1.5rem;
}
.header-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 600;
  color: var(--orange);
  background: var(--orange-soft);
  border: 1px solid var(--orange-border);
  padding: 4px 10px;
  border-radius: 20px;
  margin-bottom: 12px;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}
.header h1 {
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
  letter-spacing: -0.02em;
}
.header p {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 4px;
  line-height: 1.4;
}

/* ─── Tabs ─── */
.tabs {
  display: flex;
  background: var(--bg);
  border-radius: var(--radius-lg);
  padding: 4px;
  margin-bottom: 1.5rem;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
}
.tab {
  flex: 1;
  padding: 10px 8px;
  font-size: 13px;
  font-weight: 600;
  background: transparent;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  color: var(--text-secondary);
  transition: all 0.2s ease;
  text-align: center;
  font-family: var(--font);
}
.tab.active {
  color: #fff;
  background: var(--orange);
  box-shadow: 0 2px 8px rgba(244, 125, 48, 0.3);
}
.tab:hover:not(.active) {
  color: var(--text);
  background: var(--bg-sunken);
}
.pane { display: none; }
.pane.active { display: block; }

/* ─── Card ─── */
.card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 1.25rem 1.5rem;
  margin-bottom: 1rem;
  box-shadow: var(--shadow-md);
}

/* ─── Form fields ─── */
.field { margin-bottom: 1rem; }
.field:last-child { margin-bottom: 0; }

label {
  display: block;
  font-size: 11.5px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
label .hint {
  font-weight: 400;
  color: var(--text-muted);
  text-transform: none;
  letter-spacing: normal;
  font-size: 10.5px;
}

input, select {
  width: 100%;
  padding: 10px 12px;
  font-size: 15px;
  border: 1.5px solid var(--border-strong);
  border-radius: var(--radius);
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
input::placeholder { color: var(--text-muted); }
input:focus, select:focus {
  border-color: var(--orange);
  box-shadow: 0 0 0 3px var(--orange-glow);
}
select { cursor: pointer; }

.row2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

/* ─── Mode toggle ─── */
.mode-toggle {
  display: flex;
  gap: 10px;
  margin-bottom: 1.25rem;
}
.mode-btn {
  flex: 1;
  padding: 11px 10px;
  font-size: 13px;
  font-weight: 600;
  border-radius: var(--radius);
  cursor: pointer;
  line-height: 1.3;
  transition: all 0.2s ease;
  font-family: var(--font);
}
.mode-btn.type-a {
  background: var(--orange-soft);
  color: var(--orange-deep);
  border: 1.5px solid var(--orange-border);
}
.mode-btn.type-a.active {
  background: var(--orange);
  color: #fff;
  border-color: var(--orange);
  box-shadow: 0 2px 8px rgba(244, 125, 48, 0.25);
}
.mode-btn.type-b {
  background: var(--steel-soft);
  color: var(--steel-deep);
  border: 1.5px solid var(--steel-border);
}
.mode-btn.type-b.active {
  background: var(--steel);
  color: #fff;
  border-color: var(--steel);
  box-shadow: 0 2px 8px rgba(85, 86, 88, 0.25);
}

/* ─── Buttons ─── */
.btn-calc {
  width: 100%;
  padding: 12px;
  font-size: 15px;
  font-weight: 700;
  background: var(--orange);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  margin-bottom: 1rem;
  transition: all 0.15s ease;
  font-family: var(--font);
  letter-spacing: 0.01em;
}
.btn-calc:hover { filter: brightness(1.06); box-shadow: 0 4px 14px rgba(244, 125, 48, 0.3); }
.btn-calc:active { transform: scale(0.99); filter: brightness(0.95); }

.btn-secondary {
  width: 100%;
  padding: 10px;
  font-size: 13px;
  font-weight: 600;
  background: var(--bg);
  color: var(--text-secondary);
  border: 1.5px solid var(--border-strong);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.15s ease;
  margin-top: 10px;
  font-family: var(--font);
}
.btn-secondary:hover { background: var(--bg-sunken); border-color: var(--orange-border); color: var(--text); }

/* ─── Alerts ─── */
.alert {
  padding: 11px 14px;
  border-radius: var(--radius);
  font-size: 13px;
  line-height: 1.45;
  margin-bottom: 1rem;
  display: none;
  font-weight: 500;
}
.alert.show { display: flex; align-items: flex-start; gap: 8px; }
.alert-icon { flex-shrink: 0; font-size: 15px; line-height: 1.3; }
.alert.warn   { background: var(--warn-bg); color: var(--warn-text); border: 1px solid var(--warn-border); }
.alert.ok     { background: var(--success-bg); color: var(--success-text); border: 1px solid var(--success-border); }
.alert.info   { background: var(--info-bg); color: var(--info-text); border: 1px solid var(--info-border); }
.alert.error  { background: var(--error-bg); color: var(--error-text); border: 1px solid var(--error-border); }

/* ─── Metrics ─── */
.metric-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 1rem;
}
.metric {
  background: var(--bg);
  border-radius: var(--radius);
  padding: 1rem;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}
.metric .val {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.1;
  font-family: var(--mono);
  letter-spacing: -0.02em;
}
.metric .lbl {
  font-size: 10px;
  color: var(--text-secondary);
  margin-top: 5px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 500;
}
.metric.accent .val { color: var(--orange); }

/* ─── Capacity bar ─── */
.bar-wrap {
  background: var(--bg);
  border-radius: var(--radius);
  padding: 1rem;
  margin-bottom: 1rem;
  border: 1px solid var(--border);
  display: none;
  box-shadow: var(--shadow-sm);
}
.bar-wrap.show { display: block; }
.bar-header {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 8px;
  font-weight: 500;
}
.bar-pct { font-family: var(--mono); font-weight: 600; font-size: 13px; }
.bar-track {
  height: 14px;
  background: var(--bg-sunken);
  border-radius: 7px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.bar-fill {
  height: 100%;
  border-radius: 7px;
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s;
}

/* ─── Pending material box ─── */
.pending-box {
  background: var(--bg);
  border: 1.5px solid var(--orange-border);
  border-radius: var(--radius-lg);
  padding: 1rem 1.25rem;
  margin-bottom: 1rem;
  box-shadow: var(--shadow-sm);
}
.pending-box .pb-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--orange-deep);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 10px;
}
.pending-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}
.pending-item {
  background: var(--bg-sunken);
  border-radius: var(--radius);
  padding: 0.75rem 0.85rem;
  border: 1px solid var(--border);
}
.pending-item .val {
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  font-family: var(--mono);
}
.pending-item .lbl {
  font-size: 9.5px;
  color: var(--text-secondary);
  margin-top: 3px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  font-weight: 500;
}

/* ─── Composition cards ─── */
.comp-section { margin-bottom: 1rem; }
.comp-section-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 10px;
}
.comp-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 11px 14px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: var(--shadow-sm);
  transition: border-color 0.15s;
}
.comp-card:hover { border-color: var(--border-strong); }
.comp-card .comp-num {
  font-size: 12px;
  font-weight: 700;
  color: var(--orange);
  min-width: 100px;
}
.comp-card .comp-uds {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  font-family: var(--mono);
}
.comp-card .comp-kg {
  font-size: 12px;
  color: var(--text-secondary);
  text-align: right;
  font-family: var(--mono);
}
.comp-card.last {
  border-color: var(--orange-border);
  background: var(--orange-soft);
}
.comp-card.last .comp-uds { color: var(--orange-deep); }

/* ─── History ─── */
.divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
.hist-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.hist-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.btn-clear {
  font-size: 12px;
  color: var(--text-muted);
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  transition: all 0.15s;
  font-family: var(--font);
}
.btn-clear:hover { color: var(--error-text); background: var(--error-bg); }

.hist-item {
  background: var(--bg);
  border-radius: var(--radius);
  padding: 11px 14px;
  margin-bottom: 8px;
  font-size: 13px;
  color: var(--text-secondary);
  display: flex;
  justify-content: space-between;
  gap: 8px;
  cursor: pointer;
  border: 1px solid var(--border);
  transition: all 0.15s ease;
  box-shadow: var(--shadow-sm);
}
.hist-item:hover {
  border-color: var(--orange-border);
  box-shadow: 0 2px 8px var(--orange-glow);
}
.hist-item .hi-main { color: var(--text); font-weight: 600; }

/* ─── Results ─── */
.results { display: none; }
.results.show { display: block; animation: fadeIn 0.3s ease; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─── Footer ─── */
.footer {
  margin-top: 2.5rem;
  text-align: center;
  font-size: 12px;
  color: var(--text-muted);
  padding-bottom: 1rem;
  line-height: 1.6;
}
.footer a {
  color: var(--text-secondary);
  text-decoration: none;
  transition: color 0.15s;
}
.footer a:hover { color: var(--orange); }

/* ─── Utilities ─── */
.hidden { display: none !important; }

/* ─── Responsive tweaks ─── */
@media (max-width: 400px) {
  .pending-grid { grid-template-columns: 1fr; }
  .mode-btn { font-size: 12px; padding: 9px 6px; }
}
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <header class="header">
    <div class="header-badge">🚂 Carga ferroviaria</div>
    <h1>Calculadora de Carga</h1>
    <p>Cálculo de carga y planificación de composiciones para transporte ferroviario de perfiles de acero</p>
  </header>

  <!-- Tabs -->
  <nav class="tabs" role="tablist">
    <button class="tab active" role="tab" aria-selected="true" onclick="setTab('calc')">Cálculo de carga</button>
    <button class="tab" role="tab" aria-selected="false" onclick="setTab('comp')">Composiciones</button>
  </nav>

  <!-- ===== TAB 1: LOAD CALCULATION ===== -->
  <section class="pane active" id="pane-calc" role="tabpanel">
    <div class="mode-toggle">
      <button class="mode-btn type-a active" id="btn-unidades" onclick="setModo('unidades')">Peso máx → Unidades</button>
      <button class="mode-btn type-b" id="btn-peso" onclick="setModo('peso')">Unidades → Peso</button>
    </div>

    <div class="card">
      <div class="field" id="field-pesomax">
        <label>Peso máximo admitido <span class="hint">(kg · máx. 300.000)</span></label>
        <input type="number" id="pesoMax" placeholder="ej. 60000" min="1" max="300000" step="1" inputmode="numeric">
      </div>
      <div class="field hidden" id="field-unidades">
        <label>Número de unidades</label>
        <input type="number" id="unidadesInput" placeholder="ej. 20" min="1" step="1" inputmode="numeric">
      </div>
      <div class="field">
        <label>Formato <span class="hint">(perfil de carril)</span></label>
        <select id="formato" aria-label="Formato de carril"></select>
      </div>
      <div class="field">
        <label>Longitud por unidad <span class="hint">(m · máx. 108)</span></label>
        <input type="number" id="longitud" placeholder="ej. 12.192" min="0.001" max="108" step="0.001" inputmode="decimal">
      </div>
    </div>

    <button class="btn-calc" id="btnCalc" onclick="calcular()">Calcular</button>

    <div class="results" id="results">
      <div class="alert" id="alertBox" role="alert"></div>
      <div class="metric-grid" id="metricGrid"></div>
      <div class="bar-wrap" id="barWrap">
        <div class="bar-header">
          <span>Ocupación de carga</span>
          <span class="bar-pct" id="barPct"></span>
        </div>
        <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
      </div>
      <button class="btn-secondary" id="btnCopy" onclick="copiar()">Copiar resumen al portapapeles</button>
    </div>

    <div id="histSection" class="hidden">
      <hr class="divider">
      <div class="hist-header">
        <span class="hist-title">Historial reciente</span>
        <button class="btn-clear" onclick="limpiarHistorial()">Borrar</button>
      </div>
      <div id="histList"></div>
    </div>
  </section>

  <!-- ===== TAB 2: COMPOSITION PLANNING ===== -->
  <section class="pane" id="pane-comp" role="tabpanel">
    <div class="card">
      <div class="row2">
        <div class="field">
          <label>Formato <span class="hint">(perfil)</span></label>
          <select id="c-formato" aria-label="Formato de carril"></select>
        </div>
        <div class="field">
          <label>Longitud <span class="hint">(m · máx. 108)</span></label>
          <input type="number" id="c-longitud" placeholder="ej. 12.192" min="0.001" max="108" step="0.001" inputmode="decimal">
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>Material a cargar <span class="hint">(uds)</span></label>
          <input type="number" id="c-total" placeholder="ej. 200" min="1" step="1" inputmode="numeric">
        </div>
        <div class="field">
          <label>Material cargado <span class="hint">(uds)</span></label>
          <input type="number" id="c-cargado" placeholder="ej. 45" min="0" step="1" value="0" inputmode="numeric">
        </div>
      </div>
      <div class="field">
        <label>Peso máximo por composición <span class="hint">(kg · máx. 300.000)</span></label>
        <input type="number" id="c-pesocomp" placeholder="ej. 60000" min="1" max="300000" step="1" inputmode="numeric">
      </div>
    </div>

    <button class="btn-calc" onclick="calcularComp()">Calcular composiciones</button>

    <div class="results" id="comp-results">
      <div class="alert" id="comp-alertBox" role="alert"></div>

      <div class="pending-box" id="comp-pending">
        <div class="pb-title">Material pendiente</div>
        <div class="pending-grid">
          <div class="pending-item">
            <div class="val" id="cp-uds">—</div>
            <div class="lbl">Unidades</div>
          </div>
          <div class="pending-item">
            <div class="val" id="cp-kg">—</div>
            <div class="lbl">Peso total</div>
          </div>
          <div class="pending-item">
            <div class="val" id="cp-uunit">—</div>
            <div class="lbl">kg / unidad</div>
          </div>
        </div>
      </div>

      <div class="metric-grid" id="comp-metricGrid"></div>

      <div class="comp-section">
        <div class="comp-section-title">Detalle por composición</div>
        <div id="comp-detalle"></div>
      </div>

      <button class="btn-secondary" id="btnCopyComp" onclick="copiarComp()">Copiar resumen al portapapeles</button>
    </div>
  </section>

  <footer class="footer">
    Rubén Prendes · v2.0
    <br>
    <a href="https://github.com" target="_blank" rel="noopener">Ver en GitHub</a>
  </footer>
</div>

<script>
/* ═══════════════════════════════════════════════════
   RAIL PROFILES — weight in kg per linear meter
   ═══════════════════════════════════════════════════ */
const FORMATOS = {
  "CAR100": 74.30, "CAR200": 19.80, "CAR33C": 32.99, "CAR400": 39.76,
  "CAR440": 44.65, "CAR450": 44.79, "CAR451": 45.10, "CAR452": 45.51,
  "CAR460": 46.27, "CAR46E": 46.27, "CAR49E": 49.39, "CAR490": 49.61,
  "CAR50E": 50.90, "CAR503": 50.02, "CAR500": 49.43, "CAR54E": 54.77,
  "CAR54H": 53.82, "CAR54F": 54.57, "CAR54G": 54.31, "CAR54S": 54.54,
  "CAR540": 54.43, "CAR55R": 55.45, "CAR56E": 56.30, "CAR570": 56.89,
  "CAR578": 56.74, "CAR59R": 59.74, "CAR60A": 60.04, "CAR60E": 60.21,
  "CAR60R": 60.48, "CAR60S": 60.60, "CAR600": 60.34, "CAR61R": 60.59,
  "CAR62R": 59.75, "CAR65G": 64.88, "CAR670": 67.49, "CAR678": 67.41,
  "CAR69A": 68.95, "CAR70A": 69.82, "CAR700": 69.80, "CAR73A": 72.97,
  "CAR74A": 74.24, "CAR76A": 76.21
};

/* ─── State ─── */
let modo = "unidades";
let historial = [];
let ultimoResultado = null;
let ultimoComp = null;

/* ─── Utility: format numbers ─── */
const fmtNum = (n) => Math.round(n).toLocaleString("es-ES");
const fmtDec = (n, d = 1) => n.toFixed(d);

/* ─── Utility: show inline alert ─── */
function showAlert(el, type, icon, msg) {
  el.className = `alert ${type} show`;
  el.innerHTML = `<span class="alert-icon">${icon}</span><span>${msg}</span>`;
}
function hideAlert(el) {
  el.className = "alert";
  el.innerHTML = "";
}

/* ─── Utility: show validation error (uses inline alerts instead of native alert()) ─── */
function showError(paneId, msg) {
  const alertEl = document.getElementById(paneId === "comp" ? "comp-alertBox" : "alertBox");
  showAlert(alertEl, "error", "⚠️", msg);
  const results = document.getElementById(paneId === "comp" ? "comp-results" : "results");
  results.classList.add("show");
}

/* ─── Populate format selectors ─── */
["formato", "c-formato"].forEach(id => {
  const sel = document.getElementById(id);
  Object.keys(FORMATOS).sort().forEach(f => {
    const opt = document.createElement("option");
    opt.value = f;
    opt.textContent = `${f}  ·  ${FORMATOS[f]} kg/m`;
    sel.appendChild(opt);
  });
});

/* ─── Enter key support ─── */
document.addEventListener("keydown", (e) => {
  if (e.key !== "Enter") return;
  const active = document.querySelector(".pane.active");
  if (active.id === "pane-calc") calcular();
  else calcularComp();
});


/* ═══════════════════════════════════════
   TABS
   ═══════════════════════════════════════ */
function setTab(t) {
  document.querySelectorAll(".tab").forEach((btn, i) => {
    const isActive = ["calc", "comp"][i] === t;
    btn.classList.toggle("active", isActive);
    btn.setAttribute("aria-selected", isActive);
  });
  document.getElementById("pane-calc").classList.toggle("active", t === "calc");
  document.getElementById("pane-comp").classList.toggle("active", t === "comp");
}


/* ═══════════════════════════════════════
   TAB 1: LOAD CALCULATION
   ═══════════════════════════════════════ */
function setModo(m) {
  modo = m;
  document.getElementById("btn-unidades").classList.toggle("active", m === "unidades");
  document.getElementById("btn-peso").classList.toggle("active", m === "peso");
  document.getElementById("field-pesomax").classList.toggle("hidden", m !== "unidades");
  document.getElementById("field-unidades").classList.toggle("hidden", m !== "peso");
  document.getElementById("results").classList.remove("show");
  ultimoResultado = null;
}

function calcular() {
  const fmt = document.getElementById("formato").value;
  const lon = parseFloat(document.getElementById("longitud").value);
  const kgm = FORMATOS[fmt];

  // Validation
  if (!lon || lon <= 0 || lon > 108) {
    showError("calc", "La longitud debe estar entre 0 y 108 metros.");
    return;
  }

  const pesoUnit = kgm * lon;
  let uds, pesoTotal, pMax;

  if (modo === "unidades") {
    pMax = parseFloat(document.getElementById("pesoMax").value);
    if (!pMax || pMax <= 0) { showError("calc", "Introduce el peso máximo admitido."); return; }
    if (pMax > 300000) { showError("calc", "El peso máximo no puede superar 300.000 kg (300 t)."); return; }
    uds = Math.floor(pMax / pesoUnit);
    pesoTotal = uds * pesoUnit;
  } else {
    uds = parseInt(document.getElementById("unidadesInput").value);
    if (!uds || uds <= 0) { showError("calc", "Introduce el número de unidades."); return; }
    pesoTotal = uds * pesoUnit;
    pMax = null;
  }

  const residual = pMax !== null ? pMax - pesoTotal : null;
  const pct = pMax !== null ? (pesoTotal / pMax) * 100 : null;
  ultimoResultado = { fmt, lon, uds, pesoUnit, pesoTotal, residual, pct, pMax };

  // Alert
  const ab = document.getElementById("alertBox");
  hideAlert(ab);
  if (residual !== null && residual > 5000) {
    showAlert(ab, "warn", "⚡", `Carga subóptima: quedan ${fmtNum(residual)} kg sin aprovechar.`);
  } else if (pct !== null && pct >= 95) {
    showAlert(ab, "ok", "✅", `Carga óptima: ${fmtDec(pct)}% del peso máximo utilizado.`);
  }

  // Metrics
  const grid = document.getElementById("metricGrid");
  grid.innerHTML = "";
  const metrics = [
    { val: uds, lbl: "Unidades" },
    { val: `${fmtNum(pesoTotal)} kg`, lbl: "Peso total" },
    { val: `${fmtDec(pesoUnit)} kg`, lbl: "Peso por unidad" },
  ];
  if (residual !== null) {
    metrics.push({ val: `${fmtNum(residual)} kg`, lbl: "Peso residual" });
  }
  metrics.forEach(item => {
    const d = document.createElement("div");
    d.className = "metric";
    d.innerHTML = `<div class="val">${item.val}</div><div class="lbl">${item.lbl}</div>`;
    grid.appendChild(d);
  });

  // Capacity bar
  const bw = document.getElementById("barWrap");
  if (pct !== null) {
    bw.classList.add("show");
    const fill = document.getElementById("barFill");
    fill.style.width = Math.min(pct, 100) + "%";
    fill.style.background = pct > 95 ? "#E24B4A" : pct > 75 ? "#EF9F27" : "#1D9E75";
    document.getElementById("barPct").textContent = fmtDec(pct) + "%";
  } else {
    bw.classList.remove("show");
  }

  document.getElementById("results").classList.add("show");
  document.getElementById("btnCopy").textContent = "Copiar resumen al portapapeles";

  // History
  const entrada = modo === "unidades" ? `${fmtNum(pMax)} kg máx` : `${uds} uds`;
  historial.unshift({ id: Date.now(), fmt, lon, entrada, uds, pesoTotal: Math.round(pesoTotal), modo, pMax });
  if (historial.length > 10) historial.pop();
  renderHistorial();
}

function copiar() {
  if (!ultimoResultado) return;
  const { fmt, lon, uds, pesoTotal, pesoUnit, residual } = ultimoResultado;
  let txt = `=== Calculadora de Carga Ferroviaria ===\n`;
  txt += `Formato: ${fmt}  ·  Longitud: ${lon} m\n\n`;
  txt += `Unidades: ${uds}\n`;
  txt += `Peso total: ${fmtNum(pesoTotal)} kg\n`;
  txt += `Peso por unidad: ${fmtDec(pesoUnit)} kg\n`;
  if (residual !== null) txt += `Peso residual: ${fmtNum(residual)} kg\n`;

  navigator.clipboard.writeText(txt).then(() => {
    const b = document.getElementById("btnCopy");
    b.textContent = "✓ Copiado";
    setTimeout(() => b.textContent = "Copiar resumen al portapapeles", 2000);
  });
}

function renderHistorial() {
  const sec = document.getElementById("histSection");
  const list = document.getElementById("histList");
  if (!historial.length) { sec.classList.add("hidden"); return; }
  sec.classList.remove("hidden");
  list.innerHTML = "";
  historial.forEach(r => {
    const d = document.createElement("div");
    d.className = "hist-item";
    d.innerHTML = `
      <div><span class="hi-main">${r.fmt} · ${r.lon} m</span><br>${r.entrada}</div>
      <div style="text-align:right"><span class="hi-main">${r.uds} uds</span><br>${fmtNum(r.pesoTotal)} kg</div>`;
    d.onclick = () => {
      setModo(r.modo);
      document.getElementById("formato").value = r.fmt;
      document.getElementById("longitud").value = r.lon;
      if (r.modo === "unidades") document.getElementById("pesoMax").value = r.pMax;
      else document.getElementById("unidadesInput").value = r.uds;
    };
    list.appendChild(d);
  });
}

function limpiarHistorial() {
  historial = [];
  renderHistorial();
}


/* ═══════════════════════════════════════
   TAB 2: COMPOSITION PLANNING
   ═══════════════════════════════════════ */
function calcularComp() {
  const fmt = document.getElementById("c-formato").value;
  const lon = parseFloat(document.getElementById("c-longitud").value);
  const total = parseInt(document.getElementById("c-total").value);
  const cargado = parseInt(document.getElementById("c-cargado").value) || 0;
  const pesoComp = parseFloat(document.getElementById("c-pesocomp").value);
  const kgm = FORMATOS[fmt];

  // Validation
  if (!lon || lon <= 0 || lon > 108) { showError("comp", "La longitud debe estar entre 0 y 108 metros."); return; }
  if (!total || total <= 0) { showError("comp", "Introduce el material a cargar."); return; }
  if (cargado < 0) { showError("comp", "El material cargado no puede ser negativo."); return; }
  if (cargado > total) { showError("comp", "El material cargado no puede superar el total."); return; }
  if (!pesoComp || pesoComp <= 0) { showError("comp", "Introduce el peso máximo por composición."); return; }
  if (pesoComp > 300000) { showError("comp", "El peso por composición no puede superar 300.000 kg."); return; }

  const pesoUnit = kgm * lon;
  const pendiente = total - cargado;
  const pesoPendiente = pendiente * pesoUnit;
  const udsPorComp = Math.floor(pesoComp / pesoUnit);

  if (udsPorComp === 0) {
    showError("comp", "El peso por composición es insuficiente para una unidad de este formato y longitud.");
    return;
  }

  // Alert: all loaded
  const ab = document.getElementById("comp-alertBox");
  hideAlert(ab);
  if (pendiente === 0) {
    showAlert(ab, "ok", "✅", "Todo el material ya ha sido expedido. No hay pendiente.");
    document.getElementById("comp-results").classList.add("show");
    return;
  }

  // Compositions
  const nCompletas = Math.floor(pendiente / udsPorComp);
  const resto = pendiente % udsPorComp;
  const nTotal = nCompletas + (resto > 0 ? 1 : 0);
  const comps = [];
  for (let i = 0; i < nCompletas; i++) comps.push(udsPorComp);
  if (resto > 0) comps.push(resto);

  // Pending material
  document.getElementById("cp-uds").textContent = pendiente;
  document.getElementById("cp-kg").textContent = fmtNum(pesoPendiente) + " kg";
  document.getElementById("cp-uunit").textContent = fmtDec(pesoUnit) + " kg";

  // Summary metrics
  const mg = document.getElementById("comp-metricGrid");
  mg.innerHTML = "";
  [
    { val: nTotal, lbl: "Composiciones necesarias", accent: true },
    { val: udsPorComp, lbl: "Uds. máx. por composición" },
    { val: fmtNum(udsPorComp * pesoUnit) + " kg", lbl: "Carga máx. por composición" },
    { val: fmtNum((resto > 0 ? resto : udsPorComp) * pesoUnit) + " kg", lbl: "Carga última composición" },
  ].forEach(item => {
    const d = document.createElement("div");
    d.className = "metric" + (item.accent ? " accent" : "");
    d.innerHTML = `<div class="val">${item.val}</div><div class="lbl">${item.lbl}</div>`;
    mg.appendChild(d);
  });

  // Composition detail
  const det = document.getElementById("comp-detalle");
  det.innerHTML = "";
  comps.forEach((uds, i) => {
    const isLast = i === comps.length - 1 && resto > 0;
    const d = document.createElement("div");
    d.className = "comp-card" + (isLast ? " last" : "");
    d.innerHTML = `
      <span class="comp-num">Composición ${i + 1}${isLast ? " ★" : ""}</span>
      <span class="comp-uds">${uds} uds</span>
      <span class="comp-kg">${fmtNum(uds * pesoUnit)} kg</span>`;
    det.appendChild(d);
  });

  ultimoComp = { fmt, lon, total, cargado, pendiente, pesoUnit, pesoComp, nTotal, udsPorComp, resto, comps };
  document.getElementById("comp-results").classList.add("show");
  document.getElementById("btnCopyComp").textContent = "Copiar resumen al portapapeles";
}

function copiarComp() {
  if (!ultimoComp) return;
  const { fmt, lon, total, cargado, pendiente, pesoUnit, nTotal, udsPorComp, comps } = ultimoComp;
  let txt = `=== Planificación de Composiciones ===\n`;
  txt += `Formato: ${fmt}  ·  Longitud: ${lon} m\n`;
  txt += `Material a cargar: ${total} uds  ·  Cargado: ${cargado} uds  ·  Pendiente: ${pendiente} uds\n\n`;
  txt += `Composiciones necesarias: ${nTotal}\n\n`;
  comps.forEach((u, i) => {
    txt += `Composición ${i + 1}: ${u} uds  (${fmtNum(u * pesoUnit)} kg)\n`;
  });

  navigator.clipboard.writeText(txt).then(() => {
    const b = document.getElementById("btnCopyComp");
    b.textContent = "✓ Copiado";
    setTimeout(() => b.textContent = "Copiar resumen al portapapeles", 2000);
  });
}
</script>
</body>
